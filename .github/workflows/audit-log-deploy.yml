name: Build and Push Audit Log Kafka Worker to Docker Hub

on:
  push:
    branches:
      - audit_log_deploy_publish_profile
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./workers/audit_log_compressor
          file: ./workers/audit_log_compressor/Dockerfile
          push: true
          tags: ai4greeneln/audit_log_compressor:latest
          build-contexts: |
            webapp=./Webapp

      - name: Deploy to Azure Container Apps
        uses: azure/container-apps-deploy-action@v2
        with:
          azureCredentials: ${{ secrets.AZURE_AUDITLOGCOMPRESSOR_CREDENTIALS }}
          containerAppName: auditlogcompressor
          resourceGroup: ${{ secrets.AZURE_RESOURCE_ID }}
          imageToDeploy: docker.io/ai4greeneln/audit_log_compressor:latest
