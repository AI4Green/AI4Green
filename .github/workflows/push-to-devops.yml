name: Push to DevOps

on:
  push

jobs:
  push-to-devops:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2
      with:
        fetch-depth: 0  # Fetch all history for main branch
        ref: main  # Explicitly checkout main (redundant in this case, but clear)

    - name: Set up Git
      run: |
        git config --global user.name 'github-actions'
        git config --global user.email 'github-actions@github.com'

    - name: Push to Azure DevOps
      env:
        AZURE_DEVOPS_PAT: ${{ secrets.AZURE_DEVOPS_PAT }}
      run: |
        git remote add azure "https://$AZURE_DEVOPS_PAT@dev.azure.com/UniversityOfNottingham/DRS/_git/DR000327%20-%20Machines%20Learning%20Chemistry"
        git push azure main:main
